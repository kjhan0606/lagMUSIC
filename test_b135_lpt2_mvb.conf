[setup]
boxlength		= 100
zstart			= 50
levelmin		= 7
levelmin_TF		= 7
levelmax		= 7
padding			= 8
overlap			= 4
ref_center		= 0.5, 0.5, 0.5
ref_extent		= 0.2, 0.2, 0.2
align_top		= no
baryons			= no
use_2LPT		= no
use_LLA			= no
periodic_TF		= yes
kspace_TF       = yes

# G.4 smoke: 2LPT FD source slab primitive vs serial reference.
# Single cluster across MPI_COMM_WORLD; deterministic u; bit-identical expected.
test_zoom_slab_lpt2_meshvarbnd = yes
test_zoom_slab_lpt2_order    = 4

[cosmology]
Omega_m			= 0.276
Omega_L			= 0.724
w0			= -1.0
wa			= 0.0
Omega_b			= 0.045
H0			= 70.3
sigma_8			= 0.811
nspec			= 0.961
transfer		= eisenstein

[random]
seed[7]			= 12345
seed[8]			= 23456
seed[9]			= 34567
disk_cached     = yes

[output]
format		    = generic
filename		= /tmp/test_g4_lpt2_smoke.hdf5

[poisson]
fft_fine		= yes
accuracy		= 1e-5
pre_smooth		= 3
post_smooth		= 3
smoother		= gs
laplace_order		= 6
grad_order		= 6
