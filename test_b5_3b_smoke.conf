[setup]
boxlength        = 100
zstart           = 50
levelmin         = 6
levelmin_TF      = 6
levelmax         = 6
padding          = 8
overlap          = 4
region           = box
ref_offset       = 0.4, 0.4, 0.4
ref_extent       = 0.2, 0.2, 0.2
align_top        = no
baryons          = no
use_2LPT         = no
use_LLA          = no
periodic_TF      = yes
kspace_TF        = yes
test_zoom_slab_interp_cf_flux = yes
test_zoom_slab_halo           = 1

[cosmology]
Omega_m          = 0.276
Omega_L          = 0.724
w0               = -1.0
wa               = 0.0
Omega_b          = 0.045
H0               = 70.3
sigma_8          = 0.811
nspec            = 0.961
transfer         = eisenstein

[random]
seed[6]          = 12345

[output]
format           = generic
filename         = /tmp/test_b5_3b_smoke.hdf5

[poisson]
fft_fine         = yes
accuracy         = 1e-5
pre_smooth       = 3
post_smooth      = 3
smoother         = gs
laplace_order    = 2
grad_order       = 2
