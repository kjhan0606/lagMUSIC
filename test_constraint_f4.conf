[setup]
boxlength		= 100
zstart			= 50
levelmin		= 6
levelmin_TF		= 6
levelmax		= 7
padding			= 0
overlap			= 0
ref_center		= 0.5, 0.5, 0.5
ref_extent		= 0.5, 0.5, 0.5
align_top		= no
baryons			= no
use_2LPT		= no
use_LLA			= no
periodic_TF		= yes
kspace_TF		= yes

# F.4: with a constraint present, F.1a is disabled (no SPMD path for the
# constraint FFT solve), and the rank-0 compute_random_numbers handles
# the levelmin (+ constraint application). F.2b still SPMD-builds the
# refinement levels using the constrained levelmin wnoise.
slab_rng_refinement = auto

[cosmology]
Omega_m			= 0.276
Omega_L			= 0.724
w0			= -1.0
wa			= 0.0
Omega_b			= 0.045
H0			= 70.3
sigma_8			= 0.811
nspec			= 0.961
transfer		= eisenstein

[constraints]
constraint[0].type	= peak
constraint[0].pos	= 0.5, 0.5, 0.5
constraint[0].mass	= 1e14
constraint[0].nu	= 3.0

[random]
seed[6]			= 12345
seed[7]			= 23456
disk_cached		= yes

[output]
format			= generic
filename		= /tmp/test_constraint_f4.hdf5

[poisson]
fft_fine		= yes
accuracy		= 1e-5
pre_smooth		= 3
post_smooth		= 3
smoother		= gs
laplace_order		= 6
grad_order		= 6
