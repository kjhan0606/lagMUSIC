[setup]
boxlength		= 100
zstart			= 50
levelmin		= 7
levelmin_TF		= 7
levelmax		= 7
padding			= 8
overlap			= 4
ref_center		= 0.5, 0.5, 0.5
ref_extent		= 0.2, 0.2, 0.2
align_top		= no
baryons			= no
use_2LPT		= no
use_LLA			= no
periodic_TF		= yes
kspace_TF       = yes

# F.2a SPMD child-rng builder smoke test (rank-0 builds serial reference,
# all ranks build slab via build_child_rng_subvolume_slab_kspace, gather,
# cell-by-cell compare. Throws on mismatch).
test_child_rng_slab           = yes
test_child_rng_slab_parent_res = 128
# parent=128 → child=256. subvolume lx=128 centered (x0=64). Each rank gets
# 128/nproc x-slab. nproc=4 → 32 cells = exactly one cube (cubesize=32).
test_child_rng_slab_lx_x       = 128
test_child_rng_slab_lx_y       = 128
test_child_rng_slab_lx_z       = 128
test_child_rng_slab_x0_x       = 64
test_child_rng_slab_x0_y       = 64
test_child_rng_slab_x0_z       = 64

[cosmology]
Omega_m			= 0.276
Omega_L			= 0.724
w0			= -1.0
wa			= 0.0
Omega_b			= 0.045
H0			= 70.3
sigma_8			= 0.811
nspec			= 0.961
transfer		= eisenstein

[random]
seed[7]			= 12345
seed[8]			= 23456
seed[9]			= 34567
disk_cached     = yes

[output]
format		    = generic
filename		= /tmp/test_f2a_smoke.hdf5

[poisson]
fft_fine		= yes
accuracy		= 1e-5
pre_smooth		= 3
post_smooth		= 3
smoother		= gs
laplace_order		= 6
grad_order		= 6
