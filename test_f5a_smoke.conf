[setup]
boxlength		= 100
zstart			= 50
levelmin		= 7
levelmin_TF		= 7
levelmax		= 7
padding			= 8
overlap			= 4
ref_center		= 0.5, 0.5, 0.5
ref_extent		= 0.2, 0.2, 0.2
align_top		= no
baryons			= no
use_2LPT		= no
use_LLA			= no
periodic_TF		= yes
kspace_TF       = yes

# F.5-A SPMD per-cluster pwrite-layout smoke test. Two disjoint 64x64x64
# clusters at opposite ends of a 128x128x64 union bbox. With cubesize=32
# (default) both clusters' (x0_x, lx_x) are cube-aligned: (0,64) and (64,64).
test_per_cluster_rng              = yes
test_per_cluster_rng_parent_res   = 64
# child grid res = 2*parent = 128. Union: 128x128x64. clusters: 64x128x64.
test_per_cluster_rng_u_x0_x       = 0
test_per_cluster_rng_u_x0_y       = 0
test_per_cluster_rng_u_x0_z       = 0
test_per_cluster_rng_u_lx_x       = 128
test_per_cluster_rng_u_lx_y       = 128
test_per_cluster_rng_u_lx_z       = 64
test_per_cluster_rng_c0_x0_x      = 0
test_per_cluster_rng_c0_lx_x      = 64
test_per_cluster_rng_c1_x0_x      = 64
test_per_cluster_rng_c1_lx_x      = 64

[cosmology]
Omega_m			= 0.276
Omega_L			= 0.724
w0			= -1.0
wa			= 0.0
Omega_b			= 0.045
H0			= 70.3
sigma_8			= 0.811
nspec			= 0.961
transfer		= eisenstein

[random]
seed[7]			= 12345
disk_cached     = yes

[output]
format		    = generic
filename		= /tmp/test_f5a_smoke.hdf5

[poisson]
fft_fine		= yes
accuracy		= 1e-5
pre_smooth		= 3
post_smooth		= 3
smoother		= gs
laplace_order		= 6
grad_order		= 6
