[setup]
boxlength		= 100
zstart			= 50
levelmin		= 7
levelmin_TF		= 7
levelmax		= 7
padding			= 8
overlap			= 4
ref_center		= 0.5, 0.5, 0.5
ref_extent		= 0.2, 0.2, 0.2
align_top		= no
baryons			= no
use_2LPT		= no
use_LLA			= no
periodic_TF		= yes
kspace_TF       = yes

# G.3b SPMD subcomm child-rng builder smoke test.
# rank-0 builds serial reference (production kspace ctor) and broadcasts it.
# World is split into K sub_comms (color = world_rank / subcomm_size).
# Each sub_comm runs build_child_rng_per_cluster_subcomm_kspace, gathers to
# sub-root, then rank-0 compares against reference cell-by-cell.
test_g3b_subcomm_rng         = yes
test_g3b_subcomm_size        = 2        # np=4 -> 2 sub_comms of size 2
test_g3b_parent_res          = 32        # parent=32 -> child=64
test_g3b_parent_seed         = 31415
test_g3b_child_seed          = 27182
# subvolume default: full child (x0=0, lx=64). Each sub_rank slab = 64/2 = 32 = 1 cube.
test_g3b_x0_x                = 0
test_g3b_x0_y                = 0
test_g3b_x0_z                = 0
test_g3b_lx_x                = 64
test_g3b_lx_y                = 64
test_g3b_lx_z                = 64

[cosmology]
Omega_m			= 0.276
Omega_L			= 0.724
w0			= -1.0
wa			= 0.0
Omega_b			= 0.045
H0			= 70.3
sigma_8			= 0.811
nspec			= 0.961
transfer		= eisenstein

[random]
seed[7]			= 12345
seed[8]			= 23456
seed[9]			= 34567
disk_cached     = yes

[output]
format		    = generic
filename		= /tmp/test_g3b_smoke.hdf5

[poisson]
fft_fine		= yes
accuracy		= 1e-5
pre_smooth		= 3
post_smooth		= 3
smoother		= gs
laplace_order		= 6
grad_order		= 6
