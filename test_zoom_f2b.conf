[setup]
boxlength		= 100
zstart			= 50
levelmin		= 6
levelmin_TF		= 6
levelmax		= 7
padding			= 0
overlap			= 0
ref_center		= 0.5, 0.5, 0.5
ref_extent		= 0.5, 0.5, 0.5
align_top		= no
baryons			= no
use_2LPT		= no
use_LLA			= no
periodic_TF		= yes
kspace_TF		= yes

# F.2b production wiring: SPMD refinement-level wnoise. Auto-fires when
# eligible (cube-aligned, shift=0, multi-rank, disk_cached). At ref_extent=0.5
# the L=7 child subvolume should be 128 cells with i0=0, divisible by cube=32.
slab_rng_refinement = auto

[cosmology]
Omega_m			= 0.276
Omega_L			= 0.724
w0			= -1.0
wa			= 0.0
Omega_b			= 0.045
H0			= 70.3
sigma_8			= 0.811
nspec			= 0.961
transfer		= eisenstein

[random]
seed[6]			= 12345
seed[7]			= 23456
disk_cached		= yes

[output]
format			= generic
filename		= /tmp/test_zoom_f2b.hdf5

[poisson]
fft_fine		= yes
accuracy		= 1e-5
pre_smooth		= 3
post_smooth		= 3
smoother		= gs
laplace_order		= 6
grad_order		= 6
