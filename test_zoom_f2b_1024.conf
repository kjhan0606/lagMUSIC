[setup]
boxlength		= 100
zstart			= 50
levelmin		= 9
levelmin_TF		= 9
levelmax		= 10
padding			= 0
overlap			= 0
ref_center		= 0.5, 0.5, 0.5
ref_extent		= 0.5, 0.5, 0.5
align_top		= no
baryons			= no
use_2LPT		= no
use_LLA			= no
periodic_TF		= yes
kspace_TF		= yes

# F.2b production-scale verification step 2: levelmin=9, levelmax=10.
# L=10 child nx = 2*512 = 1024 (cube-aligned at np=4: 1024/4/32=8).
# Parent (L=9) nx=512, i0_child = offset_abs(10)-256 = 256-256 = 0, pw=0.
# wnoise_0010.bin will be 8 GB; n=1 child-rng FFT serial may take 5+ minutes.
slab_rng_refinement = auto

[cosmology]
Omega_m			= 0.276
Omega_L			= 0.724
w0			= -1.0
wa			= 0.0
Omega_b			= 0.045
H0			= 70.3
sigma_8			= 0.811
nspec			= 0.961
transfer		= eisenstein

[random]
seed[9]			= 12345
seed[10]		= 23456
disk_cached		= yes

[output]
format			= generic
filename		= /tmp/test_zoom_f2b_1024.hdf5

[poisson]
fft_fine		= yes
accuracy		= 1e-5
pre_smooth		= 3
post_smooth		= 3
smoother		= gs
laplace_order		= 6
grad_order		= 6
