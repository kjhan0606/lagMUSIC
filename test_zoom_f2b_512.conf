[setup]
boxlength		= 100
zstart			= 50
levelmin		= 8
levelmin_TF		= 8
levelmax		= 9
padding			= 0
overlap			= 0
ref_center		= 0.5, 0.5, 0.5
ref_extent		= 0.5, 0.5, 0.5
align_top		= no
baryons			= no
use_2LPT		= no
use_LLA			= no
periodic_TF		= yes
kspace_TF		= yes

# F.2b production-scale verification step 1: levelmin=8, levelmax=9.
# L=9 child nx = 2 * prefh.size(9, d) = 2*256 = 512 (cube-aligned at np=4: 512/4/32=4).
# Parent (L=8) nx=256, i0_child = offset_abs(9)-128 = 128-128 = 0, pw=0.
slab_rng_refinement = auto

[cosmology]
Omega_m			= 0.276
Omega_L			= 0.724
w0			= -1.0
wa			= 0.0
Omega_b			= 0.045
H0			= 70.3
sigma_8			= 0.811
nspec			= 0.961
transfer		= eisenstein

[random]
seed[8]			= 12345
seed[9]			= 23456
disk_cached		= yes

[output]
format			= generic
filename		= /tmp/test_zoom_f2b_512.hdf5

[poisson]
fft_fine		= yes
accuracy		= 1e-5
pre_smooth		= 3
post_smooth		= 3
smoother		= gs
laplace_order		= 6
grad_order		= 6
